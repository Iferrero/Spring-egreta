<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personas por Instituto</title>
    <script src="config.js"></script>
    <script src="uab-brand.js" defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="uab-theme.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.js"></script>

    <link href="https://unpkg.com/tabulator-tables@5.4.4/dist/css/tabulator.min.css" rel="stylesheet">
    <script src="https://unpkg.com/tabulator-tables@5.4.4/dist/js/tabulator.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>

</head>
<body class="bg-slate-50 min-h-screen font-sans">
<div class="max-w-[98%] mx-auto py-6 px-4">
    <header class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-6 mb-8">
        <div>
            <h1 class="text-xl font-black text-slate-800 tracking-tight">Personas por Instituto</h1>
            <p class="text-slate-500 font-medium text-sm">Selecciona un instituto y rango de años para ver asociaciones.</p>
        </div>

        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex flex-col sm:flex-row items-center gap-6 min-w-[420px]">
            <div class="w-full sm:w-64 px-2">
                <label class="block text-xxs font-black text-slate-400 uppercase tracking-widest mb-1">Instituto</label>
                <select id="departamentoSelect" class="w-full border border-slate-300 rounded-xl px-3 py-2 text-[13px] bg-white font-semibold text-slate-700">
                    <option value="">Cargando...</option>
                </select>
            </div>

            <div class="flex-1 w-full px-2">
                <div class="flex items-center justify-between mb-1">
                    <span class="text-xxs font-black text-slate-400 uppercase tracking-widest">Rango de años</span>
                    <span id="valorRango" class="text-xs font-black text-indigo-600"></span>
                </div>
                <div id="sliderAnios"></div>
            </div>

            <div class="flex items-center gap-2">
                <select id="modoReporte" class="border border-slate-300 rounded-xl px-3 py-2 text-[13px] bg-white font-semibold text-slate-700">
                    <option value="report">Reporte (rango de años)</option>
                    <option value="latest">Último contrato (IBB)</option>
                </select>
                <button id="btnRefrescar" class="bg-indigo-600 text-white px-4 py-2 rounded-xl font-semibold">Refrescar</button>
            </div>
        </div>
    </header>

    <div class="bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden p-4">
        <div id="dashboardTop" class="mb-4 grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div id="kpiTotal" class="col-span-1 bg-indigo-50 border border-indigo-100 rounded-xl p-4 flex flex-col justify-center items-start">
                <div class="text-xxs font-black text-slate-400 uppercase tracking-widest">Total persones</div>
                <div id="kpiTotalValue" class="text-3xl font-extrabold text-indigo-600 mt-2">0</div>
            </div>
            <div id="pieCard" class="col-span-2 bg-white rounded-xl p-4 border border-slate-100">
                <div class="text-xxs font-black text-slate-400 uppercase tracking-widest mb-2">Distribució per tipus d'ocupació</div>
                <div id="pieChart" style="height:220px; width:100%;"></div>
            </div>
        </div>

        <div id="tablaContainer">
            <div id="tablaPersonas"></div>
        </div>
    </div>
</div>

<script src="instituto-personas.js"></script>
</body>
</html>
