<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quartils per Departament</title>
    <script src="config.js"></script>
    <script src="uab-brand.js" defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="uab-theme.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <div id="loadingOverlay" class="hidden fixed inset-0 z-50 bg-slate-900/20 backdrop-blur-[1px]">
        <div class="h-full w-full flex items-center justify-center">
            <div class="bg-white border border-slate-200 rounded-2xl shadow-sm px-5 py-4 inline-flex items-center gap-3 text-sm font-semibold text-indigo-700">
                <i class="fa-regular fa-clock fa-spin"></i>
                <span>Recarregant dades...</span>
            </div>
        </div>
    </div>

    <div class="mx-auto px-6 py-8 max-w-6xl">
        <section class="bg-white border border-slate-200 rounded-2xl shadow-sm p-4 mb-6">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-3 items-end">
                <div class="lg:col-span-4">
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Departament</label>
                    <div class="relative">
                        <button id="departamentoDropdownBtn" type="button" class="w-full border border-slate-300 rounded-xl px-3 py-2 text-sm bg-white text-left flex items-center justify-between">
                            <span id="departamentoDropdownLabel">Afegeix departament...</span>
                            <i class="fa fa-chevron-down ml-2"></i>
                        </button>
                        <div id="departamentoDropdownMenu" class="absolute z-10 left-0 right-0 mt-1 bg-white border border-slate-200 rounded-xl shadow-lg max-h-56 overflow-auto hidden"></div>
                    </div>
                    <select id="departamentoSelect" multiple class="hidden"></select>
                </div>

                <div class="lg:col-span-4">
                    <div class="flex items-center justify-between mb-1">
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider">Rang d'anys</label>
                        <span id="valorRango" class="text-xs font-bold text-indigo-600"></span>
                    </div>
                    <div id="sliderAnios"></div>
                </div>
            </div>
        </section>

        <section class="mt-6">
            <div id="departamentoChipsContainer" class="flex flex-wrap gap-2 mb-3"></div>

            <section class="bg-white border border-slate-100 rounded-2xl shadow-sm p-4">
                <div id="estado" class="text-sm text-slate-500 mb-3">Mou els filtres per executar la consulta.</div>
                <div id="quartilesPie" class="w-full h-[460px]"></div>
            </section>
        </section>

        <section class="bg-white border border-slate-100 rounded-2xl shadow-sm p-4 mt-6">
            <h2 id="quartilesEvolutionTitle" class="text-sm font-bold text-slate-700 mb-3">Evolucio anual per quartils</h2>
            <div id="quartilesEvolution" class="w-full h-[360px]"></div>
        </section>

        <section class="bg-white border border-slate-100 rounded-2xl shadow-sm p-4 mt-6">
            <h2 class="text-sm font-bold text-slate-700 mb-3">Detall d'articles</h2>
            <div class="overflow-auto">
                <table class="min-w-full text-sm border border-slate-200 rounded-xl overflow-hidden">
                    <thead class="bg-slate-100 text-slate-700">
                        <tr>
                            <th class="text-left px-3 py-2 border-b border-slate-200">Any</th>
                            <th class="text-left px-3 py-2 border-b border-slate-200">Quartil</th>
                            <th class="text-left px-3 py-2 border-b border-slate-200">Cita</th>
                        </tr>
                    </thead>
                    <tbody id="tablaArticulosBody">
                        <tr>
                            <td colspan="3" class="px-3 py-3 text-slate-500">Sense dades carregades.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

    </div>

    <script src="quartiles-departamento.js"></script>
</body>
</html>
