<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Demo - Cercador d'instituts + Slider</title>
    <script src="config.js"></script>
    <script src="uab-brand.js" defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="uab-theme.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.css">
    <link href="https://unpkg.com/tabulator-tables@6.3.0/dist/css/tabulator.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.7.1/nouislider.min.js"></script>
    <script src="https://unpkg.com/tabulator-tables@6.3.0/dist/js/tabulator.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <div id="loadingOverlayDemo" class="hidden fixed inset-0 z-50 bg-slate-900/20 backdrop-blur-[1px]">
        <div class="h-full w-full flex items-center justify-center">
            <div class="bg-white border border-slate-200 rounded-2xl shadow-sm px-5 py-4 inline-flex items-center gap-3 text-sm font-semibold text-indigo-700">
                <i class="fa-regular fa-clock fa-spin"></i>
                <span>Carregant dades...</span>
            </div>
        </div>
    </div>
    <div  class="max-w-6xl mx-auto px-6 py-8">
        <header hidden class="mb-6">
                <h1 class="text-2xl font-bold text-slate-800">Dades d'instituts</h1>
                <p class="text-sm text-slate-500">Cercador combinat d'instituts + slider d'anys (2015 - any actual)</p>
        </header>

        <section class="bg-white border border-slate-200 rounded-2xl shadow-sm p-4 mb-6">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-3 items-end">
                <div class="lg:col-span-4">
                    <label for="orgSelect" class="block text-xs font-bold text-slate-500 uppercase mb-1">Institut</label>
                    <select id="orgSelect" class="w-full border border-slate-300 rounded-xl px-3 py-2 text-sm bg-white">
                        <option value="">Tots (tria institut)</option>
                        <optgroup label="Instituts" id="opt_institutos"></optgroup>
                    </select>
                </div>

                <div class="lg:col-span-6">
                    <div class="flex items-center justify-between mb-1">
                        <label class="block text-xs font-bold text-slate-500 uppercase">Rang d'anys</label>
                        <span id="valorRango" class="text-xs font-bold text-indigo-600"></span>
                    </div>
                    <div id="sliderAnios"></div>
                </div>

                <div class="lg:col-span-2 flex items-center gap-3">
                    <div class="bg-white p-3 rounded-xl shadow-sm">
                        <div class="text-xs text-slate-400">Total</div>
                        <div id="kpiTotalValue" class="text-lg font-bold text-indigo-600">--</div>
                    </div>
                </div>
            </div>
        </section>

        <section class="mt-4">
            <div class="bg-white border border-slate-100 rounded-2xl shadow-sm p-4">
                <div id="chartContainer" class="mb-4 flex flex-col lg:flex-row gap-4">
                        <div class="w-full lg:w-1/2">
                            <div id="dedicationCard" class="chart-card bg-white border border-slate-100 rounded-2xl shadow-sm p-4 relative">
                                <button onclick="abrirPantallaCompleta('dedicationCard')" class="absolute top-3 right-3 text-xs font-semibold text-indigo-600 hover:text-indigo-800">
                                    <i class="fa-solid fa-expand mr-1"></i>Pantalla completa
                                </button>
                                <h2 id="tituloDedication" class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Dedicació</h2>
                                <div id="dedicationChart" class="w-full h-[360px]"></div>
                            </div>
                        </div>
                        <div class="w-full lg:w-1/2">
                            <div id="roleCard" class="chart-card bg-white border border-slate-100 rounded-2xl shadow-sm p-4 relative">
                                <button onclick="abrirPantallaCompleta('roleCard')" class="absolute top-3 right-3 text-xs font-semibold text-indigo-600 hover:text-indigo-800">
                                    <i class="fa-solid fa-expand mr-1"></i>Pantalla completa
                                </button>
                                <h2 id="tituloRole" class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Càrrec</h2>
                                <div id="roleChart" class="w-full h-[360px]"></div>
                            </div>
                        </div>
                    <div id="chartPlaceholder" class="text-sm text-slate-400 mt-2 hidden">No hi ha dades per mostrar.</div>
                </div>
                <div id="demoTable"></div>
            </div>
        </section>
    </div>

    <script src="demo.js"></script>
</body>
</html>
