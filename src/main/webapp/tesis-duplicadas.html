<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesis por autor</title>
    <script src="config.js"></script>
    <script src="uab-brand.js" defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="uab-theme.css">
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="max-w-7xl mx-auto py-8 px-6">
        <header class="flex flex-col md:flex-row md:items-end md:justify-between gap-4 mb-6">
            <div>
                <h1 class="hidden text-3xl font-black text-slate-800">Tesis doctorales por <span class="text-indigo-600">mismo autor</span></h1>
                <p class="hidden text-slate-500 text-sm mt-1">Una fila por autor con su UUID y listado de tesis.</p>
            </div>
            <a href="index.html" class="px-4 py-2 rounded-xl border border-slate-300 text-sm font-semibold text-slate-700 hover:bg-white">Volver a inicio</a>
        </header>

        <section class="bg-white border border-slate-200 rounded-2xl shadow-sm p-4 mb-5">
            <div class="mt-3">
                <label for="filtroEstado" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Filtro</label>
                <select id="filtroEstado" class="border border-slate-300 rounded-xl px-3 py-2 text-sm">
                    <option value="todos">Todas</option>
                    <option value="pendientes">Pendientes</option>
                    <option value="arregladas">Arregladas</option>
                </select>
            </div>
            <div id="resumenEstado" class="mt-3 text-sm text-slate-600 font-semibold">Pendientes: 0 | Arregladas: 0</div>
        </section>

        <section class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden">
            <div id="estado" class="p-4 text-sm text-slate-500">Cargando datos...</div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-slate-500 text-xs uppercase tracking-widest border-y border-slate-100">
                        <tr>
                            <th class="px-5 py-3">Autor</th>
                            <th class="px-5 py-3">UUID autor</th>
                            <th class="px-5 py-3">Listado de tesis</th>
                            <th class="px-5 py-3 text-center">Arreglado</th>
                        </tr>
                    </thead>
                    <tbody id="tabla" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        let currentRows = [];

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function getFiltroEstado() {
            return document.getElementById('filtroEstado')?.value || 'todos';
        }

        function visiblePorFiltro(arreglado, filtro) {
            if (filtro === 'arregladas') return arreglado;
            if (filtro === 'pendientes') return !arreglado;
            return true;
        }

        function actualizarResumenEstado(rows) {
            const resumen = document.getElementById('resumenEstado');
            const lista = Array.isArray(rows) ? rows : [];
            let arregladas = 0;

            lista.forEach(row => {
                const rowKey = String(row.autorUuid || row.autor || '').trim();
                if (localStorage.getItem(`tesisArreglada:${rowKey}`) === '1') {
                    arregladas += 1;
                }
            });

            const pendientes = Math.max(0, lista.length - arregladas);
            resumen.textContent = `Pendientes: ${pendientes} | Arregladas: ${arregladas}`;
        }

        function renderTabla(rows) {
            const tabla = document.getElementById('tabla');

            if (!rows || rows.length === 0) {
                actualizarResumenEstado([]);
                tabla.innerHTML = '<tr><td colspan="4" class="px-5 py-12 text-center text-slate-400 italic">No se encontraron coincidencias.</td></tr>';
                return;
            }

            actualizarResumenEstado(rows);

            const filtro = getFiltroEstado();
            const rowsFiltradas = rows.filter(row => {
                const rowKey = String(row.autorUuid || row.autor || '').trim();
                const arreglado = localStorage.getItem(`tesisArreglada:${rowKey}`) === '1';
                return visiblePorFiltro(arreglado, filtro);
            });

            if (rowsFiltradas.length === 0) {
                tabla.innerHTML = '<tr><td colspan="4" class="px-5 py-12 text-center text-slate-400 italic">No hay resultados para este filtro.</td></tr>';
                return;
            }

            tabla.innerHTML = rowsFiltradas.map(row => {
                const tesis = Array.isArray(row.tesis) ? row.tesis : [];
                const rowKey = String(row.autorUuid || row.autor || '').trim();
                const arreglado = localStorage.getItem(`tesisArreglada:${rowKey}`) === '1';
                const listado = [...tesis]
                    .sort((a, b) => {
                        const byYear = Number(b.anio || 0) - Number(a.anio || 0);
                        if (byYear !== 0) {
                            return byYear;
                        }

                        return String(a.titulo || '').localeCompare(String(b.titulo || ''));
                    })
                    .map(t => `<li><span class="font-medium text-slate-700">${escapeHtml(t.titulo || 'Sin título')}</span> <span class="text-slate-500">(${escapeHtml(t.anio || '-')})</span></li>`)
                    .join('');

                return `
                    <tr class="align-top hover:bg-slate-50 ${arreglado ? 'bg-emerald-50/50' : ''}" data-row-key="${escapeHtml(rowKey)}">
                        <td class="px-5 py-4 font-semibold text-slate-700">${escapeHtml(row.autor || '-')}</td>
                        <td class="px-5 py-4"><span class="font-mono text-xs text-slate-700">${escapeHtml(row.autorUuid || '-')}</span></td>
                        <td class="px-5 py-4 text-sm"><ul class="list-disc ml-4 space-y-1">${listado}</ul></td>
                        <td class="px-5 py-4 text-center">
                            <input
                                type="checkbox"
                                class="marcar-arreglada h-4 w-4 accent-emerald-600"
                                data-key="${escapeHtml(rowKey)}"
                                ${arreglado ? 'checked' : ''}
                                title="Marcar como arreglado"
                            />
                        </td>
                    </tr>
                `;
            }).join('');

            tabla.querySelectorAll('.marcar-arreglada').forEach(input => {
                input.addEventListener('change', (event) => {
                    const key = event.target.getAttribute('data-key') || '';
                    const checked = event.target.checked;
                    if (key) {
                        localStorage.setItem(`tesisArreglada:${key}`, checked ? '1' : '0');
                    }

                    const rowEl = event.target.closest('tr');
                    if (rowEl) {
                        rowEl.classList.toggle('bg-emerald-50/50', checked);
                    }

                    renderTabla(currentRows);
                });
            });
        }

        async function cargar() {
            const estado = document.getElementById('estado');
            const minCoincidencias = 2;
            const limit = 0;

            estado.textContent = 'Cargando datos...';
            estado.className = 'p-4 text-sm text-indigo-600 font-semibold';

            try {
                const response = await apiFetch(`/student-theses/mismo-autor-director?minCoincidencias=${minCoincidencias}&limit=${limit}`);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                currentRows = Array.isArray(data) ? data : [];
                renderTabla(currentRows);
                estado.textContent = `Resultados: ${data.length} autores`;
                estado.className = 'p-4 text-sm text-emerald-600 font-semibold';
            } catch (error) {
                currentRows = [];
                renderTabla([]);
                estado.textContent = `Error al cargar datos: ${error.message}`;
                estado.className = 'p-4 text-sm text-red-600 font-semibold';
            }
        }

        document.getElementById('filtroEstado').addEventListener('change', () => renderTabla(currentRows));

        cargar();
    </script>
</body>
</html>
